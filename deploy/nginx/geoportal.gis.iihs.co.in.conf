# IIHS Geospatial Lab Geoportal
# nginx config for geoportal.gis.iihs.co.in
#
# Prerequisites:
#   - SSL certificate via Let's Encrypt:
#     certbot certonly --nginx -d geoportal.gis.iihs.co.in
#   - TerriaMap running in Docker on 127.0.0.1:3020
#
# Install:
#   cp this file /etc/nginx/sites-available/geoportal.gis.iihs.co.in
#   ln -s /etc/nginx/sites-available/geoportal.gis.iihs.co.in /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name geoportal.gis.iihs.co.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name geoportal.gis.iihs.co.in;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/geoportal.gis.iihs.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geoportal.gis.iihs.co.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml
                      application/xml+rss text/javascript image/svg+xml;

    # Cache static build assets (versioned filenames — safe to cache long)
    location /build/ {
        proxy_pass         http://127.0.0.1:3020;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # Proxy everything else to TerriaMap
    location / {
        proxy_pass         http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering    off;
    }

    # Logs
    access_log /var/log/nginx/geoportal.gis.iihs.co.in.access.log;
    error_log  /var/log/nginx/geoportal.gis.iihs.co.in.error.log;
}
