services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
    image: iihs-geoportal:latest
    container_name: iihs-geoportal
    restart: unless-stopped
    # Bind to localhost only — nginx proxies from outside
    ports:
      - "127.0.0.1:3020:3020"
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3020', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
